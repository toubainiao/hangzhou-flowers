<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- 高德地图CSS -->
    <link rel="stylesheet" href="https://a.amap.com/jsapi_demos/static/demo-center/css/demo-center.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 30px 0;
            color: white;
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        @media (max-width: 900px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .card-title {
            font-size: 1.3rem;
            margin-bottom: 15px;
            color: #667eea;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* 日历样式 */
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .calendar-header button {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .calendar-header button:hover {
            background: #5a67d8;
            transform: scale(1.05);
        }

        .current-month {
            font-size: 1.2rem;
            font-weight: bold;
            color: #333;
        }

        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            font-weight: bold;
            color: #666;
            margin-bottom: 10px;
        }

        .days-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
        }

        .day-cell {
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            font-size: 0.9rem;
        }

        .day-cell:hover {
            background: #f0f0f0;
            transform: scale(1.1);
        }

        .day-cell.selected {
            background: #667eea;
            color: white;
        }

        .day-cell.other-month {
            color: #ccc;
        }

        .day-cell.today {
            border: 2px solid #667eea;
        }

        .flower-indicator {
            position: absolute;
            bottom: 2px;
            width: 6px;
            height: 6px;
            border-radius: 50%;
        }

        .indicator-full { background: #ff4757; }
        .indicator-early { background: #ffa502; }
        .indicator-late { background: #747d8c; }
        .indicator-upcoming { background: #74b9ff; }

        /* 筛选器 */
        .filter-section {
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .filter-btn {
            padding: 8px 16px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9rem;
        }

        .filter-btn:hover, .filter-btn.active {
            border-color: #667eea;
            background: #667eea;
            color: white;
        }

        .location-input {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .location-input input {
            flex: 1;
            padding: 10px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
        }

        .location-input button {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            white-space: nowrap;
        }

        /* 地点列表 */
        .spot-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .spot-item {
            display: flex;
            align-items: center;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 10px;
            background: #f8f9fa;
            cursor: pointer;
            transition: all 0.3s;
        }

        .spot-item:hover {
            background: #e9ecef;
            transform: translateX(5px);
        }

        .spot-image {
            width: 80px;
            height: 80px;
            border-radius: 10px;
            object-fit: cover;
            margin-right: 15px;
        }

        .spot-info {
            flex: 1;
        }

        .spot-name {
            font-weight: bold;
            font-size: 1rem;
            margin-bottom: 5px;
        }

        .spot-flower {
            color: #666;
            font-size: 0.85rem;
            margin-bottom: 5px;
        }

        .spot-status {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: bold;
        }

        .status-full { background: #ff6b6b; color: white; }
        .status-early { background: #ffd93d; color: #333; }
        .status-late { background: #a8a8a8; color: white; }
        .status-upcoming { background: #74b9ff; color: white; }
        .status-ended { background: #ccc; color: #666; }

        .spot-distance {
            text-align: right;
            color: #667eea;
            font-weight: bold;
            margin-right: 10px;
        }

        .nav-btn {
            padding: 8px 16px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            white-space: nowrap;
        }

        .nav-btn:hover {
            background: #218838;
        }

        /* 高德地图 */
        #map {
            height: 400px;
            border-radius: 15px;
            margin-top: 10px;
        }

        /* 搜索提示 */
        .search-suggestions {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            margin-top: 5px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 100;
            display: none;
        }

        .search-suggestions.active {
            display: block;
        }

        .suggestion-item {
            padding: 10px 15px;
            cursor: pointer;
            border-bottom: 1px solid #eee;
        }

        .suggestion-item:hover {
            background: #f0f0f0;
        }

        /* 花期图例 */
        .legend {
            display: flex;
            gap: 15px;
            margin-top: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.85rem;
        }

        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        /* 详情弹窗 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            max-width: 500px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
            position: relative;
        }

        .modal-header {
            position: relative;
            height: 200px;
        }

        .modal-header img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 20px 20px 0 0;
        }

        .modal-close {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 35px;
            height: 35px;
            background: rgba(255,255,255,0.9);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
        }

        .modal-body {
            padding: 25px;
        }

        .modal-title {
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        .modal-info {
            color: #666;
            margin-bottom: 15px;
        }

        .best-time {
            background: #f0f0f0;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .tips {
            background: #fff3cd;
            padding: 15px;
            border-radius: 10px;
            border-left: 4px solid #ffc107;
            margin-bottom: 15px;
        }

        .nav-section {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .nav-section button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-secondary {
            background: #e0e0e0;
            color: #333;
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        /* 加载状态 */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>

                </div>
            </div>

            <!-- 右侧：地图和列表 -->
            <div class="right-section">
                <div class="card">
                    <div class="card-title">
                        <span>📍</span> 我的位置
                    </div>
                    <div style="position: relative;">

                            <input type="text" id="locationInput" placeholder="输入任意地址：小区、公司、学校、商场等（按回车）" autocomplete="off" onkeypress="if(event.key==='Enter')searchLocation()">

                            <button onclick="getCurrentLocation()">📍 定位</button>
                        </div>
                        <div class="search-suggestions" id="suggestions"></div>
                    </div>
                    <div id="map"></div>
                </div>

                <div class="card" style="margin-top: 20px;">
                    <div class="card-title">
                        <span>🌺</span> 赏花地点
                        <small id="selectedDate" style="color: #999; margin-left: auto;"></small>
                    </div>
                    <div class="spot-list" id="spotList"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal" id="detailModal">

            </div>

                <div class="tips">

        let map;

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            initCalendar();
            initMap();
            updateSpotList();
        });

        // 初始化高德地图
        function initMap() {
            map = new AMap.Map('map', {
                zoom: 11,
                center: [userLocation.lng, userLocation.lat]
            });

            updateMapMarkers();
        }

        // 更新地图标记
        function updateMapMarkers() {
            map.clearMap();

            // 添加用户位置标记
            new AMap.Marker({
                position: [userLocation.lng, userLocation.lat],
                title: '我的位置',
                icon: 'https://webapi.amap.com/theme/v1.3/markers/n/mark_r.png',
                map: map
            });

            // 添加赏花地点标记
            const dateStr = formatDate(selectedDate);
            flowerSpots.forEach(spot => {
                const status = getBloomStatus(dateStr, spot);
                if (currentFilter === 'all' || status === currentFilter) {
                    const color = getStatusColor(status);
                    const marker = new AMap.CircleMarker({
                        center: [spot.lng, spot.lat],
                        radius: 10,
                        fillColor: color,
                        strokeColor: '#fff',
                        strokeWeight: 2,
                        fillOpacity: 0.9,
                        extData: spot
                    });
                    marker.setMap(map);

                    // 信息窗体
                    const info = new AMap.InfoWindow({
                        content: `<b>${spot.name}</b><br/>${spot.flower}<br/>${getStatusText(status)}`,
                        offset: new AMap.Pixel(0, -10)
                    });

                    marker.on('click', function() {
                        info.open(map, marker.getCenter());
                        showDetail(spot.id);
                    });
                }
            });
        }

            { name: '西湖', address: '杭州市西湖区', lng: 120.128, lat: 30.245 },
            { name: '西湖文化广场', address: '杭州市拱墅区', lng: 120.165, lat: 30.275 },
            { name: '龙翔桥', address: '杭州市上城区', lng: 120.165, lat: 30.255 },
            { name: '杭州东站', address: '杭州市江干区', lng: 120.215, lat: 30.293 },
            { name: '杭州站', address: '杭州市上城区', lng: 120.180, lat: 30.245 },
            { name: '滨江', address: '杭州市滨江区', lng: 120.215, lat: 30.205 },
            { name: '萧山', address: '杭州市萧山区', lng: 120.265, lat: 30.165 },
            { name: '余杭', address: '杭州市余杭区', lng: 120.295, lat: 30.425 },
            { name: '武林广场', address: '杭州市拱墅区', lng: 120.165, lat: 30.275 },
            { name: '钱江新城', address: '杭州市上城区', lng: 120.215, lat: 30.255 },
            { name: '西溪湿地', address: '杭州市西湖区', lng: 120.065, lat: 30.265 },
            { name: '宋城', address: '杭州市西湖区', lng: 120.105, lat: 30.185 }
        ];

        // 搜索位置 - 使用高德Web服务API（JSONP方式避免跨域）
        function searchLocation() {
            const keyword = document.getElementById('locationInput').value.trim();
            if (!keyword) {
                alert('请输入搜索关键词');
                return;
            }

            console.log('开始搜索:', keyword);

            // 先尝试本地预设匹配
            const localMatches = presetLocations.filter(loc =>
                loc.name.includes(keyword) || keyword.includes(loc.name)
            );

            // 如果有本地匹配，先显示
            if (localMatches.length > 0) {
                showSuggestions(localMatches);
            }

            // 使用JSONP调用高德API
            const callbackName = 'gaodeSearchCallback_' + Date.now();
            const url = `https://restapi.amap.com/v3/place/text?key=${SEARCH_KEY}&keywords=${encodeURIComponent(keyword)}&city=杭州&citylimit=true&offset=10&page=1&extensions=all&callback=${callbackName}`;

            // 创建script标签
            const script = document.createElement('script');
            script.src = url;

            // 定义回调函数
            window[callbackName] = function(data) {
                console.log('高德搜索结果:', data);

                let allResults = [...localMatches];

                if (data.status === '1' && data.pois && data.pois.length > 0) {
                    data.pois.forEach(poi => {
                        if (poi.location) {
                            const [lng, lat] = poi.location.split(',').map(Number);
                            if (!allResults.find(r => r.name === poi.name)) {
                                allResults.push({
                                    name: poi.name,
                                    address: poi.address || poi.adname || '杭州市',
                                    lng: lng,
                                    lat: lat
                                });
                            }
                        }
                    });
                }

                if (allResults.length > 0) {
                    showSuggestions(allResults);
                } else if (localMatches.length === 0) {
                    alert('未找到相关位置，请尝试输入更具体的关键词');
                }

                // 清理
                delete window[callbackName];
                document.head.removeChild(script);
            };

            // 错误处理
            script.onerror = function() {
                console.error('搜索请求失败');
                if (localMatches.length === 0) {
                    alert('搜索服务暂时不可用，请尝试输入：西湖、东站、滨江等');
                }
                delete window[callbackName];
                document.head.removeChild(script);
            };

            // 超时处理
            setTimeout(function() {
                if (window[callbackName]) {
                    console.log('搜索超时');
                    if (localMatches.length === 0) {
                        alert('搜索超时，请检查网络或输入预设地点');
                    }
                    delete window[callbackName];
                    if (script.parentNode) {
                        document.head.removeChild(script);
                    }
                }
            }, 5000);

            document.head.appendChild(script);
        }

        // 显示搜索建议
        function showSuggestions(locations) {
            const suggestions = document.getElementById('suggestions');
            suggestions.innerHTML = locations.slice(0, 8).map(loc => `
                <div class="suggestion-item" onclick="selectLocation(${loc.lng}, ${loc.lat}, '${loc.name}')">
                    <b>${loc.name}</b><br>
                    <small style="color:#999">${loc.address || ''}</small>
                </div>
            `).join('');
            suggestions.classList.add('active');
        }

        // 选择位置
        function selectLocation(lng, lat, name) {
            userLocation = { lat, lng };
            document.getElementById('locationInput').value = name;
            document.getElementById('suggestions').classList.remove('active');

            map.setCenter([lng, lat]);
            updateMapMarkers();
            updateSpotList();
        }

        // 获取当前位置
        async function getCurrentLocation() {
            if (!navigator.geolocation) {
                alert('浏览器不支持定位');
                return;
            }

            navigator.geolocation.getCurrentPosition(
                async pos => {
                    userLocation = {
                        lat: pos.coords.latitude,
                        lng: pos.coords.longitude
                    };

                    // 使用高德逆地理编码获取地址
                    try {
                        const url = `https://restapi.amap.com/v3/geocode/regeo?key=${SEARCH_KEY}&location=${userLocation.lng},${userLocation.lat}&extensions=base`;
                        const response = await fetch(url);
                        const data = await response.json();

                        if (data.status === '1' && data.regeocode) {
                            document.getElementById('locationInput').value = data.regeocode.formatted_address;
                        }
                    } catch (e) {
                        console.log('逆地理编码失败');
                    }

                    map.setCenter([userLocation.lng, userLocation.lat]);
                    updateMapMarkers();
                    updateSpotList();
                },
                err => {
                    alert('定位失败，请检查定位权限或手动输入位置');
                }
            );
        }

        // 开始导航
        function startNavigation() {
            if (!currentSpot) return;

            const url = `https://uri.amap.com/navigation?to=${currentSpot.lng},${currentSpot.lat},${encodeURIComponent(currentSpot.name)}&mode=car&policy=1`;
            window.open(url, '_blank');
        }

        // 日历相关函数
        function initCalendar() {
            renderCalendar();
        }

        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();

            document.getElementById('currentMonth').textContent = `${year}年${month + 1}月`;

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const daysInPrevMonth = new Date(year, month, 0).getDate();

            const calendar = document.getElementById('calendar');
            calendar.innerHTML = '';

            // 上月日期
            for (let i = firstDay - 1; i >= 0; i--) {
                const day = daysInPrevMonth - i;
                calendar.appendChild(createDayCell(day, true));
            }

            // 当月日期
            for (let day = 1; day <= daysInMonth; day++) {
                const cell = createDayCell(day, false);
                const dateStr = `${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;

                const hasFlowers = flowerSpots.some(spot => isDateInBloom(dateStr, spot));
                if (hasFlowers) {
                    const indicator = document.createElement('div');
                    indicator.className = 'flower-indicator ' + getStatusClass(dateStr);
                    cell.appendChild(indicator);
                }

                const today = new Date();
                if (year === today.getFullYear() && month === today.getMonth() && day === today.getDate()) {
                    cell.classList.add('today');
                }

                if (year === selectedDate.getFullYear() && month === selectedDate.getMonth() && day === selectedDate.getDate()) {
                    cell.classList.add('selected');
                }

                cell.onclick = () => selectDate(year, month, day);
                calendar.appendChild(cell);
            }

            // 下月日期
            const remainingCells = 42 - (firstDay + daysInMonth);
            for (let day = 1; day <= remainingCells; day++) {
                calendar.appendChild(createDayCell(day, true));
            }
        }

        function createDayCell(day, isOtherMonth) {
            const cell = document.createElement('div');
            cell.className = 'day-cell' + (isOtherMonth ? ' other-month' : '');
            cell.textContent = day;
            return cell;
        }

        function getStatusClass(dateStr) {
            const spots = flowerSpots.filter(spot => isDateInBloom(dateStr, spot));
            if (spots.length === 0) return '';

            const spot = spots[0];
            if (isDateInRange(dateStr, spot.fullBloomStart, spot.fullBloomEnd)) {
                return 'indicator-full';
            } else if (isDateBefore(dateStr, spot.fullBloomStart)) {
                return 'indicator-early';
            } else {
                return 'indicator-late';
            }
        }

        function changeMonth(delta) {
            currentDate.setMonth(currentDate.getMonth() + delta);
            renderCalendar();
        }

        function selectDate(year, month, day) {
            selectedDate = new Date(year, month, day);
            renderCalendar();
            updateSpotList();
        }

        // 更新地点列表
        function updateSpotList() {
            const dateStr = formatDate(selectedDate);
            document.getElementById('selectedDate').textContent = `${selectedDate.getMonth() + 1}月${selectedDate.getDate()}日`;

            let spots = flowerSpots.map(spot => {
                const status = getBloomStatus(dateStr, spot);
                const distance = calculateDistance(userLocation.lat, userLocation.lng, spot.lat, spot.lng);
                return { ...spot, status, distance };
            });

            if (currentFilter !== 'all') {
                spots = spots.filter(spot => spot.status === currentFilter);
            }

            spots.sort((a, b) => a.distance - b.distance);

            const listEl = document.getElementById('spotList');

            if (spots.length === 0) {
                listEl.innerHTML = `
                    <div class="empty-state">
                        <div style="font-size: 3rem;">🌸</div>
                        <p>这一天暂无花卉盛开</p>
                        <p style="font-size: 0.9rem; margin-top: 10px;">试试选择其他日期</p>
                    </div>
                `;
                return;
            }

            listEl.innerHTML = spots.map(spot => `
                <div class="spot-item" onclick="showDetail(${spot.id})">
                    <img src="${spot.image}" alt="${spot.name}" class="spot-image">
                    <div class="spot-info">
                        <div class="spot-name">${spot.name}</div>
                        <div class="spot-flower">🌸 ${spot.flower}</div>
                        <span class="spot-status status-${spot.status}">${getStatusText(spot.status)}</span>
                    </div>
                    <div class="spot-distance">${formatDistance(spot.distance)}</div>
                    <button class="nav-btn" onclick="event.stopPropagation(); navigateToSpot(${spot.id})">导航</button>
                </div>
            `).join('');

            updateMapMarkers();
        }

        function getBloomStatus(dateStr, spot) {
            if (isDateInRange(dateStr, spot.fullBloomStart, spot.fullBloomEnd)) {
                return 'full';
            } else if (isDateInRange(dateStr, spot.bloomStart, spot.fullBloomStart)) {
                return 'early';
            } else if (isDateInRange(dateStr, spot.fullBloomEnd, spot.bloomEnd)) {
                return 'late';
            } else if (isDateBefore(dateStr, spot.bloomStart)) {
                return 'upcoming';
            } else {
                return 'ended';
            }
        }

        function getStatusText(status) {
            const texts = {
                'full': '盛花期',
                'early': '初开期',
                'late': '将谢期',
                'upcoming': '未开放',
                'ended': '已结束'
            };
            return texts[status] || '未知';
        }

        function getStatusColor(status) {
            const colors = {
                'full': '#ff4757',
                'early': '#ffa502',
                'late': '#747d8c',
                'upcoming': '#74b9ff',
                'ended': '#ccc'
            };
            return colors[status] || '#ccc';
        }

        function isDateInBloom(dateStr, spot) {
            return isDateInRange(dateStr, spot.bloomStart, spot.bloomEnd);
        }

        function isDateInRange(dateStr, start, end) {
            const date = new Date('2025-' + dateStr);
            const startDate = new Date('2025-' + start);
            const endDate = new Date('2025-' + end);
            return date >= startDate && date <= endDate;
        }

        function isDateBefore(dateStr, compareDate) {
            return new Date('2025-' + dateStr) < new Date('2025-' + compareDate);
        }

        function formatDate(date) {
            return `${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
        }

        // 计算距离（使用高德距离更准，这里先用简化版）
        function calculateDistance(lat1, lng1, lat2, lng2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLng = (lng2 - lng1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLng/2) * Math.sin(dLng/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }

        function formatDistance(km) {
            if (km < 1) {
                return Math.round(km * 1000) + 'm';
            }
            return km.toFixed(1) + 'km';
        }

        function setFilter(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            updateSpotList();
        }

        function showDetail(id) {
            const spot = flowerSpots.find(s => s.id === id);
            if (!spot) return;

            currentSpot = spot;
            const dateStr = formatDate(selectedDate);
            const status = getBloomStatus(dateStr, spot);

            document.getElementById('modalImage').src = spot.image;
            document.getElementById('modalTitle').textContent = spot.name;
            document.getElementById('modalInfo').textContent = spot.description;
            document.getElementById('modalStatus').innerHTML =
                `<span class="spot-status status-${status}">${getStatusText(status)}</span>`;
            document.getElementById('modalTips').textContent = spot.tips;

            document.getElementById('detailModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('detailModal').classList.remove('active');
        }

        function navigateToSpot(id) {
            const spot = flowerSpots.find(s => s.id === id);
            if (!spot) return;

            const url = `https://uri.amap.com/navigation?to=${spot.lng},${spot.lat},${encodeURIComponent(spot.name)}&mode=car&policy=1`;
            window.open(url, '_blank');
        }

        // 点击外部关闭建议框
        document.addEventListener('click', function(e) {
            if (!e.target.closest('.location-input') && !e.target.closest('.search-suggestions')) {
                document.getElementById('suggestions').classList.remove('active');
            }
        });

        document.getElementById('detailModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });
    </script>
</body>
